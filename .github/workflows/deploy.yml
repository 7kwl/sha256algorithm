name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: 'npm'
      - name: Debug - Show environment
        run: |
          echo "Node.js版本:"
          node --version
          echo "npm版本:"
          npm --version
          echo "当前目录:"
          pwd
          ls -la
      - name: Install dependencies with debug
        run: |
          echo "开始安装依赖..."
          npm install --legacy-peer-deps --verbose
          echo "依赖安装完成"
      - name: Build with error capture
        run: |
          echo "开始构建..."
          set +e  # 不立即退出，允许捕获错误
          npm run build 2>&1 | tee build.log
          BUILD_EXIT_CODE=$?
          echo "构建退出代码: $BUILD_EXIT_CODE"
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "构建失败，查看错误日志:"
            cat build.log
            exit 1
          fi
          echo "构建成功"
        env:
          CI: false
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
